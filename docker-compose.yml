version: '3.8'

services:
  web:
    build: .
    container_name: wedding_web
    ports:
      - "8080:80" 
    volumes:
      - .:/var/www/html/
    depends_on:
      - db
  db:
    image: mysql:5.7
    container_name: wedding_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: dbwedding
    ports:
      - "3306:3306"
